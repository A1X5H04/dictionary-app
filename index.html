<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictionary App</title>
  </head>
  <body>

    <div id="app">
    
    <div class="hero">
          <h3>dictionary</h3>       
        <div class="search-container">
          <span id="search-lang">english</span>
          <div class="searchbar">
            <input id="input-search" type="text" placeholder="Search Dictionary">
            <label id="search-label"></label>
            <i id="mic-btn" class="ph-microphone-bold"></i>
            <i style="display: none;" id="stop-btn" class="ph-stop-circle-bold"></i>
            <i id="search-btn" title="search query" class="ph-magnifying-glass-bold"></i>
          </div>
          <p id="description">Get a definition of the word your are looking for...</p>
        </div>
    </div>  

   

        <div id="notify-panel" class="notification-panel">
            <div id="notify-icon"></div>
            <p id="notify-content">This is a message</p>
            <!-- <div id="timeout-bar"></div> -->
        </div>
    </div>
    


  </body>
      <script src="https://unpkg.com/phosphor-icons"></script>
      <script type="text/javascript" src="./autocomplete.js"></script>
      <script type="text/javascript" src="./main.js"></script>
</html>
